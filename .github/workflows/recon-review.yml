name: Recon PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  blast-radius:
    name: Blast Radius Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Index codebase
        id: index
        continue-on-error: true
        run: npx recon index --force

      - name: Run blast radius analysis
        if: steps.index.outcome == 'success'
        id: analysis
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          OUTPUT=$(node dist/scripts/pr-review.js "$BASE" 2>/dev/null || echo "")
          {
            echo "report<<RECON_EOF"
            echo "$OUTPUT"
            echo "RECON_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: steps.analysis.outputs.report != ''
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.analysis.outputs.report }}
        with:
          script: |
            const body = process.env.REPORT;
            if (!body || !body.trim()) return;

            // Find and update existing Recon comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- recon-blast-radius -->';
            const fullBody = marker + '\n' + body;
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
